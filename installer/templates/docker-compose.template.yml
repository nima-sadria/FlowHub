# FlowHub Docker Compose template
# Generated output, when used by tooling: docker-compose.beta.yml
# Current runtime stack: app + PostgreSQL. No nginx, worker, or redis service is
# active in the first release.

name: flowhub

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.beta
    image: flowhub-beta:latest
    restart: unless-stopped
    ports:
      - "${BETA_PORT:-8085}:8085"
    env_file:
      - .env.beta
    volumes:
      - ./storage:/data/storage
      - ./backups:/data/backups
      - ./logs:/data/logs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8085/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.beta
    environment:
      POSTGRES_DB: "${BETA_POSTGRES_DB}"
      POSTGRES_USER: "${BETA_POSTGRES_USER}"
      POSTGRES_PASSWORD: "${BETA_POSTGRES_PASSWORD}"
    volumes:
      - beta_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  beta_pgdata:
    driver: local
