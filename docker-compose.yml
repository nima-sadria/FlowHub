# FlowHub - Docker Compose stack
#
# Target host: /opt/FlowHub  (port 8085, profile: production)
# External TLS/proxy: Nginx Proxy Manager (not managed here)
# No Nginx container - NPM handles reverse proxy on the host
# No Redis container - not required until B6 (cache/queue implementation)
#
# Usage:
#   cp .env.example .env && nano .env   # fill real secrets
#   docker compose --env-file .env -f docker-compose.yml config  # validate
#   docker compose --env-file .env -f docker-compose.yml up -d --build
#
# Verify:
#   docker compose -f docker-compose.yml ps
#   curl -s http://localhost:8085/api/health | python3 -m json.tool
#   flowhub diagnostics run  (if CLI installed)

name: flowhub

services:
  frontend:
    profiles:
      - build
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-build
    image: flowhub-frontend-build:latest

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: flowhub:latest
    restart: unless-stopped
    ports:
      # Host port is configurable via FLOWHUB_PORT; the app always listens on 8085
      # inside the container. Health checks and the completion report use the
      # same FLOWHUB_PORT, so these must stay in sync.
      - "${FLOWHUB_BIND_IP:-0.0.0.0}:${FLOWHUB_PORT:-8085}:8085"
    env_file:
      - .env
    volumes:
      - ./storage:/data/storage
      - ./backups:/data/backups
      - ./logs:/data/logs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8085/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  order-sync-runner:
    image: flowhub:latest
    restart: unless-stopped
    command: ["python", "-m", "app.flowhub.orders.runner"]
    env_file:
      - .env
    volumes:
      - ./storage:/data/storage
      - ./backups:/data/backups
      - ./logs:/data/logs
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Map FLOWHUB_POSTGRES_* -> standard PostgreSQL env vars
      POSTGRES_DB: "${FLOWHUB_POSTGRES_DB}"
      POSTGRES_USER: "${FLOWHUB_POSTGRES_USER}"
      POSTGRES_PASSWORD: "${FLOWHUB_POSTGRES_PASSWORD}"
    volumes:
      - flowhub_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  flowhub_pgdata:
    driver: local
