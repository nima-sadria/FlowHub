name: Bug report
description: Report a reproducible FlowHub bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands, pages, and inputs.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Commit or release
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Redact secrets before pasting logs.
