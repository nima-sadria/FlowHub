name: Feature request
description: Suggest a FlowHub improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow should improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the requested behavior.
    validations:
      required: true
  - type: dropdown
    id: safety
    attributes:
      label: Does this affect write execution?
      options:
        - "No"
        - "Yes"
        - "Unsure"
    validations:
      required: true
