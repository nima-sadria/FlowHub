name: FlowHub frontend verification

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    env:
      FLOWHUB_ENV: test
      VITE_APP_ENV: test
      # The resolver permits the evaluation key only in this explicit test
      # build; production builds still fail closed without a purchased key.
      VITE_HANDSONTABLE_LICENSE_KEY: non-commercial-and-evaluation
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Install isolated Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Frontend unit tests
        working-directory: frontend
        run: npm test -- --run
      - name: Frontend production build
        working-directory: frontend
        run: npm run build
      - name: Browser E2E benchmark
        working-directory: frontend
        run: npm run test:e2e -- --grep "virtualizes" --reporter=line --trace on
      - name: Browser E2E identity interactions
        working-directory: frontend
        run: npm run test:e2e -- --grep "keeps visible Listing identity" --reporter=line --trace on
      - name: Frontend dependency audit
        working-directory: frontend
        run: npm audit --audit-level=low
      - name: Upload browser diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flowhub-frontend-e2e-${{ github.run_id }}
          path: frontend/test-results
          if-no-files-found: warn
