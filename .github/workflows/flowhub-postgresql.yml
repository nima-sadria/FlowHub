name: FlowHub PostgreSQL safety

on:
  push:
    branches: [main]
  pull_request:

jobs:
  postgres-safety:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: flowhub_test
          POSTGRES_USER: flowhub_test
          POSTGRES_PASSWORD: flowhub_test_local_only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flowhub_test -d flowhub_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      FLOWHUB_ENV: test
      DATABASE_URL: postgresql+psycopg://flowhub_test:flowhub_test_local_only@127.0.0.1:5432/flowhub_test
      FLOWHUB_DATABASE_URL: postgresql+psycopg://flowhub_test:flowhub_test_local_only@127.0.0.1:5432/flowhub_test
      FLOWHUB_TEST_POSTGRES_URL: postgresql+psycopg://flowhub_test:flowhub_test_local_only@127.0.0.1:5432/flowhub_test
      WC_URL: http://example.invalid
      SNAPPSHOP_BASE_URL: http://example.invalid
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt psycopg[binary] pytest
      - name: Verify isolated test targets
        run: |
          python - <<'PY'
          import os
          from urllib.parse import urlparse
          db = urlparse(os.environ['FLOWHUB_DATABASE_URL'])
          assert db.hostname in {'127.0.0.1', 'localhost'}
          assert db.path.lstrip('/') == 'flowhub_test'
          assert os.environ['WC_URL'].endswith('.invalid')
          assert os.environ['SNAPPSHOP_BASE_URL'].endswith('.invalid')
          assert os.environ['FLOWHUB_ENV'] == 'test'
          print(f"postgres_host={db.hostname} postgres_port={db.port or 5432} postgres_database={db.path.lstrip('/')}")
          print('isolated PostgreSQL and provider targets confirmed')
          PY
      - name: Wait for PostgreSQL and print version
        run: |
          python - <<'PY'
          import os
          import psycopg
          from urllib.parse import urlparse
          sqlalchemy_url = os.environ['FLOWHUB_TEST_POSTGRES_URL']
          psycopg_url = sqlalchemy_url.replace('postgresql+psycopg://', 'postgresql://', 1)
          parsed = urlparse(psycopg_url)
          with psycopg.connect(psycopg_url) as connection:
              print(connection.execute('SELECT version()').fetchone()[0])
              print(f"effective_host={parsed.hostname} effective_port={parsed.port or 5432} effective_database={parsed.path.lstrip('/')}")
          PY
      - name: PostgreSQL 016 immutability and FK test
        id: postgres-016-immutability
        run: |
          set +e
          python -m pytest -q -ra --strict-markers --tb=long --junitxml=postgres-junit.xml \
            tests/flowhub/migration/test_unified_workspace_016.py::test_postgresql_immutability_and_foreign_keys 2>&1 | tee postgres-output.log
          pytest_status=${PIPESTATUS[0]}
          if [ "$pytest_status" -ne 0 ]; then detail=$(tail -120 postgres-output.log | tr '\n' ' ' | cut -c1-6000); echo "::error title=PostgreSQL 016 failure::$detail"; fi
          if [ -f postgres-junit.xml ]; then
            python scripts/assert_postgres_junit.py postgres-junit.xml 016-immutability | tee postgres-manifest.log
            manifest_status=${PIPESTATUS[0]}
          else
            echo 'pytest did not produce postgres-junit.xml' | tee postgres-manifest.log
            manifest_status=1
          fi
          test "$pytest_status" -eq 0
          test "$manifest_status" -eq 0
      - name: PostgreSQL 015 to 016 preservation test
        id: postgres-016-upgrade
        run: |
          set +e
          python -m pytest -q -ra --strict-markers --tb=long --junitxml=postgres-016-upgrade-junit.xml \
            tests/flowhub/migration/test_unified_workspace_016.py::test_postgresql_upgrade_from_015_preserves_sentinel 2>&1 | tee postgres-016-upgrade-output.log
          pytest_status=${PIPESTATUS[0]}
          python scripts/assert_postgres_junit.py postgres-016-upgrade-junit.xml 016-upgrade | tee postgres-016-upgrade-manifest.log
          manifest_status=${PIPESTATUS[0]}
          test "$pytest_status" -eq 0
          test "$manifest_status" -eq 0
      - name: PostgreSQL global Listing lock uniqueness test
        id: postgres-016-lock
        run: |
          set +e
          python -m pytest -q -ra --strict-markers --tb=long --junitxml=postgres-016-lock-junit.xml \
            tests/flowhub/migration/test_unified_workspace_016.py::test_postgresql_global_lock_uniqueness_under_concurrency 2>&1 | tee postgres-016-lock-output.log
          pytest_status=${PIPESTATUS[0]}
          python scripts/assert_postgres_junit.py postgres-016-lock-junit.xml 016-lock | tee postgres-016-lock-manifest.log
          manifest_status=${PIPESTATUS[0]}
          test "$pytest_status" -eq 0
          test "$manifest_status" -eq 0
      - name: PostgreSQL FLOWHUB_017 migration repair tests
        id: postgres-017-tests
        run: |
          set +e
          python -m pytest -q -ra --strict-markers --tb=long --junitxml=postgres-017-junit.xml \
            tests/flowhub/migration/test_unified_workspace_017.py 2>&1 | tee postgres-017-output.log
          pytest_status=${PIPESTATUS[0]}
          if [ -f postgres-017-junit.xml ]; then
            python scripts/assert_postgres_junit.py postgres-017-junit.xml 017 | tee postgres-017-manifest.log
            manifest_status=${PIPESTATUS[0]}
          else
            echo 'pytest did not produce postgres-017-junit.xml' | tee postgres-017-manifest.log
            manifest_status=1
          fi
          test "$pytest_status" -eq 0
          test "$manifest_status" -eq 0
      - name: PostgreSQL FLOWHUB_018 source workspace migration tests
        id: postgres-018-tests
        run: |
          set +e
          python -m pytest -q -ra --strict-markers --tb=long --junitxml=postgres-018-junit.xml \
            tests/flowhub/migration/test_source_workspace_018.py::test_postgresql_018_fresh_schema_foreign_keys_and_immutability \
            tests/flowhub/migration/test_source_workspace_018.py::test_postgresql_017_to_018_preserves_v12_sentinel \
            2>&1 | tee postgres-018-output.log
          pytest_status=${PIPESTATUS[0]}
          if [ -f postgres-018-junit.xml ]; then
            python scripts/assert_postgres_junit.py postgres-018-junit.xml 018 | tee postgres-018-manifest.log
            manifest_status=${PIPESTATUS[0]}
          else
            echo 'pytest did not produce postgres-018-junit.xml' | tee postgres-018-manifest.log
            manifest_status=1
          fi
          test "$pytest_status" -eq 0
          test "$manifest_status" -eq 0
      - name: FLOWHUB_019 cross-dialect worksheet rule migration tests
        id: postgres-019-tests
        run: |
          set +e
          python -m pytest -q -ra --strict-markers --tb=long --junitxml=postgres-019-junit.xml \
            tests/flowhub/migration/test_source_workspace_019.py \
            2>&1 | tee postgres-019-output.log
          pytest_status=${PIPESTATUS[0]}
          if [ -f postgres-019-junit.xml ]; then
            python scripts/assert_postgres_junit.py postgres-019-junit.xml 019 | tee postgres-019-manifest.log
            manifest_status=${PIPESTATUS[0]}
          else
            echo 'pytest did not produce postgres-019-junit.xml' | tee postgres-019-manifest.log
            manifest_status=1
          fi
          test "$pytest_status" -eq 0
          test "$manifest_status" -eq 0
      - name: PostgreSQL Workspace snapshot persistence tests
        id: postgres-workspace-persistence-tests
        run: |
          set +e
          python -m pytest -q -ra --strict-markers --tb=long \
            --junitxml=postgres-workspace-persistence-junit.xml \
            tests/flowhub/unified_workspace/test_snapshot_persistence_postgres.py \
            2>&1 | tee postgres-workspace-persistence-output.log
          pytest_status=${PIPESTATUS[0]}
          if [ "$pytest_status" -ne 0 ]; then detail=$(tail -120 postgres-workspace-persistence-output.log | tr '\n' ' ' | cut -c1-6000); echo "::error title=PostgreSQL Workspace persistence failure::$detail"; fi
          if [ -f postgres-workspace-persistence-junit.xml ]; then
            python scripts/assert_postgres_junit.py \
              postgres-workspace-persistence-junit.xml \
              workspace-persistence | tee postgres-workspace-persistence-manifest.log
            manifest_status=${PIPESTATUS[0]}
          else
            echo 'pytest did not produce postgres-workspace-persistence-junit.xml' | tee postgres-workspace-persistence-manifest.log
            manifest_status=1
          fi
          if [ "$pytest_status" -ne 0 ] || [ "$manifest_status" -ne 0 ]; then
            exit 1
          fi
      - name: PostgreSQL order and concurrency tests
        id: postgres-order-tests
        run: |
          set +e
          python -m pytest -q -ra --strict-markers --tb=long --junitxml=postgres-orders-junit.xml \
            tests/flowhub/orders/test_order_sync_postgres.py 2>&1 | tee postgres-orders-output.log
          pytest_status=${PIPESTATUS[0]}
          if [ -f postgres-orders-junit.xml ]; then
            python scripts/assert_postgres_junit.py postgres-orders-junit.xml orders | tee postgres-orders-manifest.log
            manifest_status=${PIPESTATUS[0]}
          else
            echo 'pytest did not produce postgres-orders-junit.xml' | tee postgres-orders-manifest.log
            manifest_status=1
          fi
          test "$pytest_status" -eq 0
          test "$manifest_status" -eq 0
      - name: Hard-process crash recovery tests
        id: postgres-crash-tests
        run: |
          set +e
          python -m pytest -q -ra --strict-markers --tb=long --junitxml=postgres-crash-junit.xml \
            tests/flowhub/write_pipeline/test_crash_recovery_process.py 2>&1 | tee postgres-crash-output.log
          pytest_status=${PIPESTATUS[0]}
          if [ "$pytest_status" -ne 0 ]; then detail=$(tail -120 postgres-crash-output.log | tr '\n' ' ' | cut -c1-6000); echo "::error title=PostgreSQL crash recovery failure::$detail"; fi
          if [ -f postgres-crash-junit.xml ]; then
            python scripts/assert_postgres_junit.py postgres-crash-junit.xml crash | tee postgres-crash-manifest.log
            manifest_status=${PIPESTATUS[0]}
          else
            echo 'pytest did not produce postgres-crash-junit.xml' | tee postgres-crash-manifest.log
            manifest_status=1
          fi
          test "$pytest_status" -eq 0
          test "$manifest_status" -eq 0
      - name: Upload PostgreSQL test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flowhub-postgresql-safety-${{ github.run_id }}
          path: |
            postgres-junit.xml
            postgres-output.log
            postgres-manifest.log
            postgres-016-upgrade-junit.xml
            postgres-016-upgrade-output.log
            postgres-016-upgrade-manifest.log
            postgres-016-lock-junit.xml
            postgres-016-lock-output.log
            postgres-016-lock-manifest.log
            postgres-017-junit.xml
            postgres-017-output.log
            postgres-017-manifest.log
            postgres-018-junit.xml
            postgres-018-output.log
            postgres-018-manifest.log
            postgres-019-junit.xml
            postgres-019-output.log
            postgres-019-manifest.log
            postgres-workspace-persistence-junit.xml
            postgres-workspace-persistence-output.log
            postgres-workspace-persistence-manifest.log
            postgres-orders-junit.xml
            postgres-orders-output.log
            postgres-orders-manifest.log
            postgres-crash-junit.xml
            postgres-crash-output.log
            postgres-crash-manifest.log
            .pytest_cache
          if-no-files-found: warn
