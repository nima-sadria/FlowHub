name: flowhub-test

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flowhub_lease_test
      POSTGRES_USER: flowhub_test
      POSTGRES_PASSWORD: flowhub_test_local_only
    ports:
      - "127.0.0.1:${FLOWHUB_TEST_POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowhub_test -d flowhub_lease_test"]
      interval: 2s
      timeout: 3s
      retries: 20
    tmpfs:
      - /var/lib/postgresql/data
